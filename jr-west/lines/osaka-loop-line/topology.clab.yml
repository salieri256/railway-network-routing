name: jr-west-osaka-loop-line
prefix: __lab-name
topology:
  defaults:
    kind: linux
    image: quay.io/frrouting/frr:10.4.0
    binds:
      - ../../nodes/common/daemons:/etc/frr/daemons
      - ../../nodes/common/vtysh.conf:/etc/frr/vtysh.conf

  nodes:
    jr-west-common-tennoji:
      kind: ext-container

    jr-west-common-shin-imamiya:
      kind: ext-container

    imamiya:
      binds:
        - ../../nodes/imamiya/frr.conf:/etc/frr/frr.conf

    ashiharabashi:
      binds:
        - ../../nodes/ashiharabashi/frr.conf:/etc/frr/frr.conf

    taisho:
      binds:
        - ../../nodes/taisho/frr.conf:/etc/frr/frr.conf

    bentencho:
      binds:
        - ../../nodes/bentencho/frr.conf:/etc/frr/frr.conf

    jr-west-common-nishikujo:
      kind: ext-container

    noda:
      binds:
        - ../../nodes/noda/frr.conf:/etc/frr/frr.conf

    fukushima:
      binds:
        - ../../nodes/fukushima/frr.conf:/etc/frr/frr.conf

    jr-west-common-osaka:
      kind: ext-container

    temma:
      binds:
        - ../../nodes/temma/frr.conf:/etc/frr/frr.conf

    sakuranomiya:
      binds:
        - ../../nodes/sakuranomiya/frr.conf:/etc/frr/frr.conf

    jr-west-common-kyobashi:
      kind: ext-container

    osakajokoen:
      binds:
        - ../../nodes/osakajokoen/frr.conf:/etc/frr/frr.conf

    morinomiya:
      binds:
        - ../../nodes/morinomiya/frr.conf:/etc/frr/frr.conf

    tamatsukuri:
      binds:
        - ../../nodes/tamatsukuri/frr.conf:/etc/frr/frr.conf

    tsuruhashi:
      binds:
        - ../../nodes/tsuruhashi/frr.conf:/etc/frr/frr.conf

    momodani:
      binds:
        - ../../nodes/momodani/frr.conf:/etc/frr/frr.conf

    teradacho:
      binds:
        - ../../nodes/teradacho/frr.conf:/etc/frr/frr.conf

  links:
    - endpoints: ["jr-west-common-tennoji:to-shiya", "jr-west-common-shin-imamiya:to-ten"]
    - endpoints: ["jr-west-common-shin-imamiya:to-ima", "imamiya:to-shiya"]
    - endpoints: ["imamiya:to-ara", "ashiharabashi:to-ima"]
    - endpoints: ["ashiharabashi:to-tase", "taisho:to-ara"]
    - endpoints: ["taisho:to-hete", "bentencho:to-tase"]
    - endpoints: ["bentencho:to-niku", "jr-west-common-nishikujo:to-hete"]
    - endpoints: ["jr-west-common-nishikujo:to-nota", "noda:to-niku"]
    - endpoints: ["noda:to-fuku", "fukushima:to-nota"]
    - endpoints: ["fukushima:to-osa", "jr-west-common-osaka:to-fuku"]
    - endpoints: ["jr-west-common-osaka:to-tema", "temma:to-osa"]
    - endpoints: ["temma:to-sara", "sakuranomiya:to-tema"]
    - endpoints: ["sakuranomiya:to-kiha", "jr-west-common-kyobashi:to-sara"]
    - endpoints: ["jr-west-common-kyobashi:to-oshi", "osakajokoen:to-kiha"]
    - endpoints: ["osakajokoen:to-momi", "morinomiya:to-oshi"]
    - endpoints: ["morinomiya:to-tsuri", "tamatsukuri:to-momi"]
    - endpoints: ["tamatsukuri:to-tsuha", "tsuruhashi:to-tsuri"]
    - endpoints: ["tsuruhashi:to-moni", "momodani:to-tsuha"]
    - endpoints: ["momodani:to-teta", "teradacho:to-moni"]
    - endpoints: ["teradacho:to-ten", "jr-west-common-tennoji:to-teta"]
